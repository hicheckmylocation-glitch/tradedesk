<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeDesk — Indian Paper Trading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--panel:#111827;--border:#1e2d45;--accent:#00d4aa;
  --red:#ff4757;--green:#00d4aa;--yellow:#ffa502;--text:#e2e8f0;
  --muted:#64748b;--card:#161f2e;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#ticker-bar{background:#0d1420;border-bottom:1px solid var(--border);padding:6px 0;overflow:hidden;white-space:nowrap;flex-shrink:0}
#ticker-inner{display:inline-block;animation:ticker 60s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-block;margin:0 24px;color:var(--muted)}
.tick-item span{font-weight:bold}
.tick-up{color:var(--green)}
.tick-down{color:var(--red)}
#header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
#header h1{color:var(--accent);font-size:16px;letter-spacing:2px}
.balance-info{margin-left:auto;display:flex;gap:24px;font-size:12px}
.bal-item{text-align:right}
.bal-item label{color:var(--muted);display:block;font-size:10px}
.bal-item span{font-weight:bold}
#market-status{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:bold}
.market-open{background:#00d4aa22;color:var(--green);border:1px solid var(--green)}
.market-closed{background:#ff475722;color:var(--red);border:1px solid var(--red)}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#search-box{padding:8px;border-bottom:1px solid var(--border)}
#search-box input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:12px}
#search-box input:focus{outline:none;border-color:var(--accent)}
#sector-filter{display:flex;gap:4px;padding:6px 8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.sector-btn{padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-family:inherit}
.sector-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
#stock-list{flex:1;overflow-y:auto}
#stock-list::-webkit-scrollbar{width:4px}
#stock-list::-webkit-scrollbar-track{background:var(--panel)}
#stock-list::-webkit-scrollbar-thumb{background:var(--border)}
.stock-item{padding:8px 12px;border-bottom:1px solid #0d1420;cursor:pointer;transition:background .15s}
.stock-item:hover{background:var(--card)}
.stock-item.active{background:#00d4aa11;border-left:2px solid var(--accent)}
.stock-item .s-name{font-weight:bold;font-size:12px}
.stock-item .s-sector{color:var(--muted);font-size:10px}
.stock-item .s-price{float:right;text-align:right}
.stock-item .s-price .price{font-weight:bold;font-size:13px}
.stock-item .s-price .chg{font-size:10px}
.up{color:var(--green)}.down{color:var(--red)}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.tab-btn{padding:10px 20px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:12px;border-bottom:2px solid transparent;transition:.2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#tab-content{flex:1;overflow-y:auto;padding:16px}
#tab-content::-webkit-scrollbar{width:4px}
#tab-content::-webkit-scrollbar-thumb{background:var(--border)}

/* Market Watch */
.stock-detail-header{display:flex;align-items:flex-start;gap:24px;margin-bottom:16px;flex-wrap:wrap}
.stock-big-price{font-size:28px;font-weight:bold}
.stock-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--border);padding:10px;border-radius:4px}
.stat-box label{color:var(--muted);font-size:10px;display:block}
.stat-box span{font-weight:bold;font-size:13px}
.trade-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.trade-box{background:var(--card);border:1px solid var(--border);padding:12px;border-radius:4px}
.trade-box h3{margin-bottom:10px;font-size:12px}
.trade-box label{color:var(--muted);font-size:10px;display:block;margin-bottom:3px}
.trade-box input,.trade-box select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:3px;font-family:inherit;font-size:12px;margin-bottom:8px}
.trade-box input:focus,.trade-box select:focus{outline:none;border-color:var(--accent)}
.btn-buy{width:100%;padding:8px;background:var(--green);color:#000;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-weight:bold;font-size:12px}
.btn-sell{width:100%;padding:8px;background:var(--red);color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-weight:bold;font-size:12px}
.charges-box{background:var(--bg);border:1px solid var(--border);padding:8px;border-radius:3px;margin-bottom:8px;font-size:10px}
.charges-box div{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted)}
.charges-box .total{color:var(--text);font-weight:bold;border-top:1px solid var(--border);padding-top:4px;margin-top:4px}

/* Chart */
#chart-container{background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:12px}
#chart-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
#chart-toolbar span{color:var(--muted);font-size:10px}
.tf-btn{padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:10px;border-radius:3px}
.tf-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.ind-btn{padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:10px;border-radius:3px}
.ind-btn.active{background:#1e2d45;color:var(--accent);border-color:var(--accent)}
#ohlcv-display{padding:6px 12px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;gap:16px}
#ohlcv-display span{color:var(--text)}
canvas#mainChart{display:block;cursor:crosshair}
canvas#rsiChart{display:block;cursor:crosshair;border-top:1px solid var(--border)}
canvas#macdChart{display:block;cursor:crosshair;border-top:1px solid var(--border)}

/* Options */
.options-header{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.options-header input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:3px;font-family:inherit;font-size:12px;width:120px}
.options-header select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:3px;font-family:inherit;font-size:12px}
.options-table{width:100%;border-collapse:collapse;font-size:11px}
.options-table th{background:var(--card);padding:7px 10px;text-align:center;color:var(--muted);border:1px solid var(--border);font-size:10px}
.options-table td{padding:6px 10px;text-align:center;border:1px solid #0d1420}
.options-table tr.atm{background:#00d4aa0a}
.options-table tr.atm td.strike{color:var(--accent);font-weight:bold}
.options-table td.ce-side{color:var(--green)}
.options-table td.pe-side{color:var(--red)}
.options-table td.strike{background:var(--card);color:var(--text)}
.opt-btn{padding:3px 10px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:bold}
.opt-buy{background:#00d4aa22;color:var(--green);border:1px solid var(--green)}
.opt-sell{background:#ff475722;color:var(--red);border:1px solid var(--red)}

/* Portfolio */
.portfolio-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.port-card{background:var(--card);border:1px solid var(--border);padding:12px;border-radius:4px}
.port-card label{color:var(--muted);font-size:10px;display:block;margin-bottom:4px}
.port-card span{font-size:18px;font-weight:bold}
.holdings-table{width:100%;border-collapse:collapse;font-size:11px}
.holdings-table th{background:var(--card);padding:7px 10px;text-align:left;color:var(--muted);border:1px solid var(--border);font-size:10px}
.holdings-table td{padding:7px 10px;border-bottom:1px solid #0d1420}
.close-btn{padding:3px 10px;background:#ff475722;color:var(--red);border:1px solid var(--red);border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px}

/* Orders */
.orders-table{width:100%;border-collapse:collapse;font-size:11px}
.orders-table th{background:var(--card);padding:7px 10px;text-align:left;color:var(--muted);border:1px solid var(--border);font-size:10px}
.orders-table td{padding:7px 10px;border-bottom:1px solid #0d1420}

.notification{position:fixed;top:60px;right:16px;padding:10px 16px;border-radius:4px;font-size:12px;z-index:1000;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif-success{background:#00d4aa22;border:1px solid var(--green);color:var(--green)}
.notif-error{background:#ff475722;border:1px solid var(--red);color:var(--red)}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>

// Initialize price history
STOCKS.forEach(s => {
  s.history = [];
  s.change = 0;
  s.changePct = 0;
  s.open = s.price;
  s.high = s.price;
  s.low = s.price;
  s.volume = 0;
  s.prevClose = s.price * (1 + (Math.random()-0.5)*0.02);
});

// ─── PRICE ENGINE ─────────────────────────────────────────────────────────────
function generateInitialHistory(stock) {
  const steps = {
    '1MIN': {candles:60,seconds:60},
    '5MIN': {candles:75,seconds:300},
    '10MIN': {candles:60,seconds:600},
    '15MIN': {candles:48,seconds:900},
    '30MIN': {candles:30,seconds:1800},
    '1HR': {candles:24,seconds:3600},
  };
  const cfg = steps[chartTf];
  const now = Date.now();
  const startMs = now - cfg.candles * cfg.seconds * 1000;
  let price = stock.price * (1 + (Math.random()-0.5)*0.05);
  const candles = [];
  for(let i=0;i<cfg.candles;i++){
    const t = startMs + i*cfg.seconds*1000;
    const ticks = [];
    let p = price;
    for(let j=0;j<10;j++){
      p *= (1+(Math.random()-0.502)*0.003);
      ticks.push(p);
    }
    const open = price;
    const close = ticks[ticks.length-1];
    const high = Math.max(open,close,...ticks);
    const low = Math.min(open,close,...ticks);
    const vol = Math.floor(Math.random()*50000+5000);
    candles.push({t,o:open,h:high,l:low,c:close,v:vol});
    price = close;
  }
  return candles;
}

function tickPrices(){
  STOCKS.forEach(s=>{
    const move = (Math.random()-0.501)*0.003;
    s.price = parseFloat((s.price*(1+move)).toFixed(2));
    s.change = parseFloat((s.price - s.prevClose).toFixed(2));
    s.changePct = parseFloat(((s.change/s.prevClose)*100).toFixed(2));
    if(s.price > s.high) s.high = s.price;
    if(s.price < s.low) s.low = s.price;
    s.volume += Math.floor(Math.random()*1000+100);

    // Update last candle or add new one
    const steps={
      '1MIN':60000,'5MIN':300000,'10MIN':600000,
      '15MIN':900000,'30MIN':1800000,'1HR':3600000
    };
    const tf = steps[chartTf];
    const now = Date.now();
    if(!s.history.length){
      s.history = generateInitialHistory(s);
    }
    const last = s.history[s.history.length-1];
    if(now - last.t < tf){
      last.c = s.price;
      if(s.price > last.h) last.h = s.price;
      if(s.price < last.l) last.l = s.price;
      last.v += Math.floor(Math.random()*500+50);
    } else {
      s.history.push({t:now,o:s.price,h:s.price,l:s.price,c:s.price,v:Math.floor(Math.random()*5000+1000)});
      if(s.history.length > 300) s.history.shift();
    }
  });
  updatePnL();
  renderSidebar();
  renderTicker();
  if(selectedStock && currentTab==='market') renderMarketWatch();
  if(selectedStock && currentTab==='chart') drawChart();
  if(selectedStock && currentTab==='portfolio') renderPortfolio();
}

// ─── MARKET WATCH ─────────────────────────────────────────────────────────────
function calcCharges(price,qty,type){
  const turnover=price*qty;
  const brokerage=0;
  const stt=turnover*0.001;
  const exchange=turnover*0.0000322;
  const sebi=turnover*0.000001;
  const gst=(brokerage+exchange)*0.18;
  const stamp=type==='BUY'?turnover*0.00015:0;
  const total=brokerage+stt+exchange+sebi+gst+stamp;
  return {brokerage,stt,exchange,sebi,gst,stamp,total,turnover};
}

function placeTrade(type){
  const s=selectedStock;
  const priceEl=document.getElementById(type==='BUY'?'buy-price':'sell-price');
  const qtyEl=document.getElementById(type==='BUY'?'buy-qty':'sell-qty');
  const price=parseFloat(priceEl.value)||s.price;
  const qty=parseInt(qtyEl.value)||1;
  const charges=calcCharges(price,qty,type);
  const totalCost=price*qty+charges.total;

  if(type==='BUY'){
    if(totalCost>state.cash){notify('Insufficient funds!','error');return;}
    state.cash-=totalCost;
    const existing=state.holdings.find(h=>h.symbol===s.symbol&&h.type==='EQ');
    if(existing){
      existing.avgPrice=(existing.avgPrice*existing.qty+price*qty)/(existing.qty+qty);
      existing.qty+=qty;
    } else {
      state.holdings.push({symbol:s.symbol,name:s.name,type:'EQ',qty,avgPrice:price,buyDate:new Date().toISOString()});
    }
  } else {
    const existing=state.holdings.find(h=>h.symbol===s.symbol&&h.type==='EQ');
    if(!existing||existing.qty<qty){notify('Insufficient holdings!','error');return;}
    const proceeds=price*qty-charges.total;
    state.cash+=proceeds;
    existing.qty-=qty;
    if(existing.qty===0) state.holdings=state.holdings.filter(h=>!(h.symbol===s.symbol&&h.type==='EQ'));
  }
  state.orders.unshift({symbol:s.symbol,type,qty,price,charges:charges.total,time:new Date().toISOString(),orderType:'EQ'});
  saveState();
  updateBalanceDisplay();
  notify(`${type} ${qty} ${s.symbol} @ ₹${fmtN(price)}`);
}

function setupChartEvents(){
  const mc=document.getElementById('mainChart');
  if(!mc)return;
  mc.addEventListener('mousedown',e=>{chartDragStart={x:e.clientX,off:chartOffset}});
  mc.addEventListener('mousemove',e=>{
    if(chartDragStart){chartOffset=chartDragStart.off+(e.clientX-chartDragStart.x);drawChart();}
    crosshairPos={x:e.offsetX,y:e.offsetY};drawChart();
  });
  mc.addEventListener('mouseup',()=>chartDragStart=null);
  mc.addEventListener('mouseleave',()=>{chartDragStart=null;crosshairPos=null;drawChart();});
  mc.addEventListener('wheel',e=>{e.preventDefault();chartZoom=Math.max(20,Math.min(150,chartZoom+(e.deltaY>0?5:-5)));drawChart();},{passive:false});
}

function drawChart(){
  const mc=document.getElementById('mainChart');
  if(!mc||!selectedStock)return;
  const s=selectedStock;
  const W=mc.parentElement.clientWidth;
  mc.width=W;

  const showRSI=chartIndicators.RSI;
  const showMACD=chartIndicators.MACD;
  const mainH=showRSI||showMACD?260:340;
  mc.height=mainH;
  const ctx=mc.getContext('2d');
  ctx.fillStyle='#161f2e';ctx.fillRect(0,0,W,mainH);

  const candles=s.history;
  if(!candles.length)return;
  const cw=Math.max(4,chartZoom/5);
  const gap=2;
  const candleW=cw-gap;
  const totalCandles=Math.floor(W/(cw));
  const endIdx=candles.length;
  const startIdx=Math.max(0,endIdx-totalCandles+Math.round(chartOffset/cw));
  const visible=candles.slice(Math.max(0,startIdx),endIdx);
  if(!visible.length)return;

  const pad={l:60,r:10,t:10,b:30};
  const cH=mainH-pad.t-pad.b;
  const priceMin=Math.min(...visible.map(c=>c.l))*.999;
  const priceMax=Math.max(...visible.map(c=>c.h))*1.001;
  const pRange=priceMax-priceMin;
  const px=p=>pad.t+cH*(1-(p-priceMin)/pRange);
  const cx=(i)=>pad.l+i*(cw);

  // Grid
  ctx.strokeStyle='#1e2d4533';ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=pad.t+cH*i/4;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    const price=priceMax-pRange*i/4;
    ctx.fillStyle='#64748b';ctx.font='10px Courier New';ctx.textAlign='right';
    ctx.fillText('₹'+fmtN(price),pad.l-4,y+3);
  }

  // EMA calculation
  function calcEMA(data,period){
    const k=2/(period+1);let ema=data[0];
    return data.map(v=>{ema=v*k+ema*(1-k);return ema;});
  }
  const closes=visible.map(c=>c.c);
  
  if(chartIndicators.BB){
    const ma20=calcEMA(closes,20);
    const upper=ma20.map((m,i)=>{
      if(i<20)return m;
      const slice=closes.slice(Math.max(0,i-20),i);
      const std=Math.sqrt(slice.reduce((a,v)=>a+(v-m)**2,0)/slice.length);
      return m+2*std;
    });
    const lower=ma20.map((m,i)=>{
      if(i<20)return m;
      const slice=closes.slice(Math.max(0,i-20),i);
      const std=Math.sqrt(slice.reduce((a,v)=>a+(v-m)**2,0)/slice.length);
      return m-2*std;
    });
    ctx.fillStyle='rgba(139,92,246,0.08)';
    ctx.beginPath();
    upper.forEach((v,i)=>i===0?ctx.moveTo(cx(i)+candleW/2,px(v)):ctx.lineTo(cx(i)+candleW/2,px(v)));
    lower.slice().reverse().forEach((v,i)=>ctx.lineTo(cx(lower.length-1-i)+candleW/2,px(v)));
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#8b5cf699';ctx.lineWidth=1;
    [upper,lower].forEach(arr=>{
      ctx.beginPath();arr.forEach((v,i)=>i===0?ctx.moveTo(cx(i)+candleW/2,px(v)):ctx.lineTo(cx(i)+candleW/2,px(v)));ctx.stroke();
    });
  }

  if(chartIndicators.MA20){
    const ema=calcEMA(closes,20);
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.beginPath();
    ema.forEach((v,i)=>{if(i<3)return;i===3?ctx.moveTo(cx(i)+candleW/2,px(v)):ctx.lineTo(cx(i)+candleW/2,px(v));});ctx.stroke();
  }
  if(chartIndicators.MA50){
    const ema=calcEMA(closes,50);
    ctx.strokeStyle='#eab308';ctx.lineWidth=1.5;ctx.beginPath();
    ema.forEach((v,i)=>{if(i<5)return;i===5?ctx.moveTo(cx(i)+candleW/2,px(v)):ctx.lineTo(cx(i)+candleW/2,px(v));});ctx.stroke();
  }

  // Volume
  if(chartIndicators.VOL){
    const maxVol=Math.max(...visible.map(c=>c.v));
    const volH=40;
    visible.forEach((c,i)=>{
      const h=(c.v/maxVol)*volH;
      ctx.fillStyle=c.c>=c.o?'rgba(0,212,170,0.3)':'rgba(255,71,87,0.3)';
      ctx.fillRect(cx(i),mainH-pad.b-h,candleW,h);
    });
  }

  // Candles
  visible.forEach((c,i)=>{
    const bull=c.c>=c.o;
    ctx.strokeStyle=bull?'#00d4aa':'#ff4757';
    ctx.fillStyle=bull?'#00d4aa':'#ff4757';
    ctx.lineWidth=1;
    const x=cx(i)+candleW/2;
    ctx.beginPath();ctx.moveTo(x,px(c.h));ctx.lineTo(x,px(c.l));ctx.stroke();
    const top=Math.min(px(c.o),px(c.c));
    const ht=Math.abs(px(c.o)-px(c.c))||1;
    if(bull){ctx.fillRect(cx(i),top,candleW,ht);}
    else{ctx.strokeRect(cx(i),top,candleW,ht);}
  });

  // Crosshair & OHLCV
  if(crosshairPos&&crosshairPos.x>pad.l){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(crosshairPos.x,0);ctx.lineTo(crosshairPos.x,mainH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.l,crosshairPos.y);ctx.lineTo(W,crosshairPos.y);ctx.stroke();
    ctx.setLineDash([]);
    const idx=Math.floor((crosshairPos.x-pad.l)/cw);
    if(idx>=0&&idx<visible.length){
      const c=visible[idx];
      document.getElementById('c-o').textContent='₹'+fmtN(c.o);
      document.getElementById('c-h').textContent='₹'+fmtN(c.h);
      document.getElementById('c-l').textContent='₹'+fmtN(c.l);
      document.getElementById('c-c').textContent='₹'+fmtN(c.c);
      document.getElementById('c-v').textContent=c.v.toLocaleString('en-IN');
    }
  }

  // RSI
  if(showRSI){
    const rc=document.getElementById('rsiChart');
    if(rc){
      rc.width=W;rc.height=80;
      const rx=rc.getContext('2d');
      rx.fillStyle='#0f172a';rx.fillRect(0,0,W,80);
      const rsiH=80,rsiPad={t:5,b:15};
      [30,50,70].forEach(l=>{
        const y=rsiPad.t+(rsiH-rsiPad.t-rsiPad.b)*(1-l/100);
        rx.strokeStyle='#1e2d4566';rx.lineWidth=1;
        rx.beginPath();rx.moveTo(pad.l,y);rx.lineTo(W-pad.r,y);rx.stroke();
        rx.fillStyle='#64748b';rx.font='9px Courier New';rx.textAlign='right';
        rx.fillText(l,pad.l-4,y+3);
      });
      // Calculate RSI
      function calcRSI(prices,period=14){
        if(prices.length<period+1)return prices.map(()=>50);
        const rsi=[];let avgGain=0,avgLoss=0;
        for(let i=1;i<=period;i++){const d=prices[i]-prices[i-1];if(d>0)avgGain+=d;else avgLoss-=d;}
        avgGain/=period;avgLoss/=period;
        rsi.push(100-100/(1+avgGain/avgLoss));
        for(let i=period+1;i<prices.length;i++){
          const d=prices[i]-prices[i-1];
          if(d>0){avgGain=(avgGain*(period-1)+d)/period;avgLoss=avgLoss*(period-1)/period;}
          else{avgGain=avgGain*(period-1)/period;avgLoss=(avgLoss*(period-1)-d)/period;}
          rsi.push(100-100/(1+avgGain/avgLoss));
        }
        return [...new Array(period).fill(50),...rsi];
      }
      const rsi=calcRSI(closes);
      const rpy=v=>rsiPad.t+(rsiH-rsiPad.t-rsiPad.b)*(1-v/100);
      rx.strokeStyle='#f59e0b';rx.lineWidth=1.5;rx.beginPath();
      rsi.forEach((v,i)=>{
        const x=cx(i)+candleW/2;
        i===0?rx.moveTo(x,rpy(v)):rx.lineTo(x,rpy(v));
      });rx.stroke();
      rx.fillStyle='#64748b';rx.font='9px Courier New';rx.textAlign='left';rx.fillText('RSI(14)',pad.l+4,12);
    }
  }
}

// ─── OPTIONS ──────────────────────────────────────────────────────────────────
function blackScholes(S,K,T,r,sigma,type){
  if(T<=0)return Math.max(0,type==='CE'?S-K:K-S);
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  const d2=d1-sigma*Math.sqrt(T);
  function N(x){
    const a1=0.319381530,a2=-0.356563782,a3=1.781477937,a4=-1.821255978,a5=1.330274429;
    const p=0.2316419,t=1/(1+p*Math.abs(x));
    const poly=((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t;
    const n=Math.exp(-x*x/2)/Math.sqrt(2*Math.PI)*(1-poly);
    return x>=0?1-n:n;
  }
  if(type==='CE') return S*N(d1)-K*Math.exp(-r*T)*N(d2);
  return K*Math.exp(-r*T)*N(-d2)-S*N(-d1);
}

    <button class="tf-btn" onclick="strikeCenter=null;renderOptions()">RESET</button>
  </div>
  <table class="options-table">
    <thead><tr>
      <th colspan="5" style="color:var(--green)">CALL (CE)</th>
      <th>STRIKE</th>
      <th colspan="5" style="color:var(--red)">PUT (PE)</th>
    </tr>
    <tr>
      <th>LTP</th><th>IV%</th><th>Delta</th><th>Volume</th><th>Action</th>
      <th>STRIKE</th>
      <th>Action</th><th>Volume</th><th>Delta</th><th>IV%</th><th>LTP</th>
    </tr></thead>
    <tbody id="options-body"></tbody>
  </table>`;

  const expiryVal=document.getElementById('expiry-sel').value;
  const expDate=new Date(expiryVal);
  const T=Math.max(0,(expDate-now)/(365*24*3600*1000));
  const r=0.065,sigma=0.18;
  const strikes=[];
  for(let i=-10;i<=10;i++) strikes.push(center+i*step);

  const tbody=document.getElementById('options-body');
  tbody.innerHTML=strikes.map(K=>{
    const isATM=Math.abs(K-s.price)<step/2;
    const ceP=blackScholes(s.price,K,T,r,sigma,'CE');
    const peP=blackScholes(s.price,K,T,r,sigma,'PE');
    const ceVol=Math.floor(Math.random()*100000+1000);
    const peVol=Math.floor(Math.random()*100000+1000);
    const ceDelta=Math.min(0.99,Math.max(0.01,(s.price-K)/s.price*5+0.5)).toFixed(2);
    const peDelta=(-1+parseFloat(ceDelta)).toFixed(2);
    const iv=(sigma*100*(1+Math.random()*0.1)).toFixed(1);
    return `<tr class="${isATM?'atm':''}">
      <td class="ce-side">₹${ceP.toFixed(2)}</td>
      <td class="ce-side">${iv}%</td>
      <td class="ce-side">${ceDelta}</td>
      <td class="ce-side">${ceVol.toLocaleString('en-IN')}</td>
      <td><button class="opt-btn opt-buy" onclick="buyOption('${s.symbol}',${K},'CE','${expiryVal}',${ceP.toFixed(2)})">BUY</button></td>
      <td class="strike ${isATM?'atm':''}" style="${isATM?'color:var(--accent);font-weight:bold':''}">₹${K.toLocaleString('en-IN')}</td>
      <td><button class="opt-btn opt-buy" onclick="buyOption('${s.symbol}',${K},'PE','${expiryVal}',${peP.toFixed(2)})">BUY</button></td>
      <td class="pe-side">${peVol.toLocaleString('en-IN')}</td>
      <td class="pe-side">${peDelta}</td>
      <td class="pe-side">${iv}%</td>
      <td class="pe-side">₹${peP.toFixed(2)}</td>
    </tr>`;
  }).join('');
}

function jumpStrike(){
  const v=parseInt(document.getElementById('strike-jump').value);
  if(v>0){strikeCenter=v;renderOptions();}
}

function buyOption(symbol,strike,type,expiry,premium){
  const cost=premium*25; // 1 lot = 25 (NIFTY)
  if(cost>state.cash){notify('Insufficient funds!','error');return;}
  state.cash-=cost;
  state.holdings.push({symbol:`${symbol} ${strike} ${type}`,name:`${symbol} ${strike} ${type} ${expiry}`,type:'OPT',symbol_u:symbol,strike,optType:type,expiry,qty:25,avgPrice:premium,buyDate:new Date().toISOString()});
  state.orders.unshift({symbol:`${symbol} ${strike} ${type}`,type:'BUY',qty:25,price:premium,charges:0,time:new Date().toISOString(),orderType:'OPT'});
  saveState();updateBalanceDisplay();
  notify(`Bought ${symbol} ${strike} ${type} @ ₹${premium.toFixed(2)}`);
}

// ─── PORTFOLIO ────────────────────────────────────────────────────────────────
function getCurrentPrice(h){
  if(h.type==='EQ'){
    const s=STOCKS.find(x=>x.symbol===h.symbol);
    return s?s.price:h.avgPrice;
  } else {
    const s=STOCKS.find(x=>x.symbol===h.symbol_u);
    if(!s)return h.avgPrice;
    const now=new Date(),expDate=new Date(h.expiry);
    const T=Math.max(0,(expDate-now)/(365*24*3600*1000));
    return blackScholes(s.price,h.strike,T,0.065,0.18,h.optType);
  }
}

function updatePnL(){
  let portVal=0,totalPnL=0;
  state.holdings.forEach(h=>{
    const cp=getCurrentPrice(h);
    const val=cp*h.qty;
    portVal+=val;
    totalPnL+=(cp-h.avgPrice)*h.qty;
  });
  document.getElementById('portfolio-display').textContent=fmt(portVal);
  const pnlEl=document.getElementById('pnl-display');
  pnlEl.textContent=fmt(totalPnL);
  pnlEl.className=totalPnL>=0?'up':'down';
}

function updateBalanceDisplay(){
  document.getElementById('cash-display').textContent=fmt(state.cash);
  updatePnL();
}

function renderPortfolio(){
  let portVal=0,totalPnL=0;
  const rows=state.holdings.map(h=>{
    const cp=getCurrentPrice(h);
    const val=cp*h.qty;
    const pnl=(cp-h.avgPrice)*h.qty;
    const pnlPct=((cp-h.avgPrice)/h.avgPrice*100);
    portVal+=val;totalPnL+=pnl;
    const cl=pnl>=0?'up':'down';
    return `<tr>
      <td><div style="font-weight:bold">${h.symbol}</div><div style="color:var(--muted);font-size:10px">${h.type}</div></td>
      <td>${h.qty}</td>
      <td>${fmt(h.avgPrice)}</td>
      <td>${fmt(cp)}</td>
      <td>${fmt(val)}</td>
      <td class="${cl}">${fmt(pnl)} (${pnlPct.toFixed(2)}%)</td>
      <td><button class="close-btn" onclick="closePosition('${h.symbol}','${h.type}')">CLOSE</button></td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML=`
  <div class="portfolio-summary">
    <div class="port-card"><label>PORTFOLIO VALUE</label><span>${fmt(portVal)}</span></div>
    <div class="port-card"><label>AVAILABLE CASH</label><span>${fmt(state.cash)}</span></div>
    <div class="port-card"><label>TOTAL P&L</label><span class="${totalPnL>=0?'up':'down'}">${fmt(totalPnL)}</span></div>
  </div>
  ${state.holdings.length?`
  <table class="holdings-table">
    <thead><tr><th>SYMBOL</th><th>QTY</th><th>AVG PRICE</th><th>LTP</th><th>VALUE</th><th>P&L</th><th>ACTION</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`:'<div class="empty-state">No open positions</div>'}`;
}

function closePosition(symbol,type){
  const h=state.holdings.find(x=>x.symbol===symbol&&x.type===type);
  if(!h)return;
  const cp=getCurrentPrice(h);
  const proceeds=cp*h.qty;
  state.cash+=proceeds;
  state.holdings=state.holdings.filter(x=>!(x.symbol===symbol&&x.type===type));
  state.orders.unshift({symbol,type:'SELL',qty:h.qty,price:cp,charges:0,time:new Date().toISOString(),orderType:type});
  saveState();updateBalanceDisplay();
  notify(`Closed ${symbol} @ ₹${fmtN(cp)}`);
  renderPortfolio();
}

// ─── ORDERS ───────────────────────────────────────────────────────────────────
function renderOrders(){
  document.getElementById('tab-content').innerHTML=`
  <table class="orders-table">
    <thead><tr><th>TIME</th><th>SYMBOL</th><th>TYPE</th><th>QTY</th><th>PRICE</th><th>CHARGES</th><th>TOTAL</th></tr></thead>
    <tbody>${state.orders.length?state.orders.map(o=>`<tr>
      <td style="color:var(--muted)">${new Date(o.time).toLocaleString('en-IN')}</td>
      <td style="font-weight:bold">${o.symbol}</td>
      <td class="${o.type==='BUY'?'up':'down'}">${o.type}</td>
      <td>${o.qty}</td>
      <td>${fmt(o.price)}</td>
      <td style="color:var(--muted)">${fmt(o.charges||0)}</td>
      <td>${fmt(o.price*o.qty)}</td>
    </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No orders yet</td></tr>'}</tbody>
  </table>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSectors();
renderSidebar();
renderTicker();
updateMarketStatus();
updateBalanceDisplay();
STOCKS.forEach(s=>s.history=generateInitialHistory(s));
setInterval(tickPrices,3000);
setInterval(updateMarketStatus,60000);
</script>
</body>
